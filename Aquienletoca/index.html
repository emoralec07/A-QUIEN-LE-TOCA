<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Quién Le Toca</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>A Quién LeToca</h1>
      <p>Divide gastos entre amigos, sin drama.</p>
    </header>

    <div class="container">
      <!-- Participantes -->

      <div class="card">
        <h2>👥 Participantes</h2>
        <label>Nombre</label>
        <input type="text" id="nameInput" placeholder="Ej: Ana" />
        <button class="btn" onclick="addParticipant()">+ Agregar</button>
        <div class="tags" id="tagList" style="margin-top: 14px"></div>
      </div>

      <!-- Agregar gasto -->

      <div class="card">
        <h2>💸 Nuevo Gasto</h2>
        <label>Descripción</label>
        <input type="text" id="descInput" placeholder="Ej: Pizza" />
        <label>Monto (S/)</label>
        <input
          type="number"
          id="amountInput"
          placeholder="0.00"
          min="0"
          step="0.01"
        />
        <label>¿Quién pagó?</label>
        <select id="payerSelect">
          <option value="">— seleccionar —</option>
        </select>
        <label>Dividir entre:</label>
        <div class="check-group" id="splitGroup"></div>
        <button class="btn" onclick="addExpense()">Registrar gasto</button>
      </div>

      <!-- Lista de gastos -->

      <div class="card">
        <h2>📋 Gastos</h2>
        <div class="expense-list" id="expenseList">
          <p class="empty">Aún no hay gastos registrados.</p>
        </div>
      </div>

      <!-- Balances -->

      <div class="card">
        <h2>⚖️ Quién debe a quién</h2>
        <div class="balance-list" id="balanceList">
          <p class="empty">
            Agrega participantes y gastos para ver los balances.
          </p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
